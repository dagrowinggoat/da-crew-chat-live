<!DOCTYPE html>
<html>
  <head>
    <title>Da Crew Chat</title>
    <style>
      body { margin: 0; padding-bottom: 3rem; font-family: sans-serif; background-color: #111; color: #fff; }
      #form { background: #222; padding: 0.25rem; position: fixed; bottom: 0; left: 0; right: 0; display: flex; height: 3rem; box-sizing: border-box; border-top: 3px solid #ff0000; }
      
      /* Zero border-radius. Sharp edges only. */
      #input { border: 2px solid #333; padding: 0 1rem; flex-grow: 1; margin: 0.25rem; background-color: #000; color: #fff; font-size: 1rem; border-radius: 0px; }
      #input:focus { outline: 2px solid #ff0000; }
      
      /* Zero border-radius on da button. */
      #form > button { background: #ff0000; border: none; padding: 0 1.5rem; margin: 0.25rem; outline: none; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 0px; }
      
      #messages { list-style-type: none; margin: 0; padding: 0; }
      #messages > li { padding: 0.75rem 1rem; border-bottom: 1px solid #222; font-size: 1.1rem; }
      #messages > li:nth-child(odd) { background: #1a1a1a; }
      .header { background: #ff0000; color: white; padding: 12px; text-align: center; border-bottom: 4px solid #000; }
      .header h2 { margin: 0; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>Da Chat Room</h2>
    </div>
    
    <ul id="messages"></ul>
    
    <form id="form" action="">
      <input id="input" autocomplete="off" placeholder="Drop a message to Da Crew..." /><button>Send</button>
    </form>

    <!-- Grab da socket.io engine from da server -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
      var socket = io();

      var form = document.getElementById('form');
      var input = document.getElementById('input');
      var messages = document.getElementById('messages');

      // Send da message when hitting submit
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (input.value) {
          socket.emit('chat message', input.value);
          input.value = '';
        }
      });

      // Catch messages sent from da server and post them up
      socket.on('chat message', function(msg) {
        var item = document.createElement('li');
        item.textContent = msg;
        messages.appendChild(item);
        window.scrollTo(0, document.body.scrollHeight);
      });
    </script>
  </body>
</html>
